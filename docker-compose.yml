services:
  catalog-service:
    build:
      context: ./catalog_service
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bulbstore
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bulbstore-network

  order-service:
    build:
      context: ./order_service
    ports:
      - "8081:8081"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bulbstore
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bulbstore-network

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bulbstore
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bulbstore"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - bulbstore-network

networks:
  bulbstore-network:
    driver: bridge
