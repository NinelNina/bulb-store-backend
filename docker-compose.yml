services:
  catalog-service:
    build:
      context: ./catalog_service
    ports:
      - "8080:8080"
    environment:
      - CATALOG_DB_USER=postgres
      - CATALOG_DB_PASSWORD=postgres
      - CATALOG_DB_HOST=catalog-db
      - CATALOG_DB_PORT=5432
      - CATALOG_DB_NAME=catalog_db
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - bulbstore-network

  order-service:
    build:
      context: ./order_service
    ports:
      - "8081:8081"
    environment:
      - ORDER_DB_USER=postgres
      - ORDER_DB_PASSWORD=postgres
      - ORDER_DB_HOST=order-db
      - ORDER_DB_PORT=5432
      - ORDER_DB_NAME=order_db
      - CATALOG_SERVICE_URL=http://localhost:8080/catalog
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - bulbstore-network

  catalog-db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=catalog_db
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - bulbstore-network

  order-db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order_db
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - bulbstore-network


networks:
  bulbstore-network:
    driver: bridge
